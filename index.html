<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audit Educa — Template System Demo</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Site header (fora do sistema de templates — mantém igual ao site) */
    .ae-site-header {
      background: var(--navy);
      padding: 0.85rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .ae-site-header__brand {
      font-family: var(--font-display);
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.01em;
    }
    .ae-site-header__sub {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.55);
      font-family: var(--font-body);
      margin-top: 0.1rem;
    }
    .ae-site-header__nav { display: flex; gap: 1.5rem; }
    .ae-site-header__nav a {
      font-size: var(--scale-sm);
      color: rgba(255,255,255,0.75);
      font-family: var(--font-body);
      font-weight: 500;
      transition: color 0.15s;
    }
    .ae-site-header__nav a:hover { color: var(--gold); }

    /* Demo notice */
    .ae-demo-notice {
      background: #fefce8;
      border-bottom: 1px solid #fde68a;
      text-align: center;
      padding: 0.5rem 1rem;
      font-size: 0.75rem;
      color: #92400e;
      font-family: monospace;
    }
  </style>
</head>
<body>

<div class="ae-demo-notice">
  🛠 DEMO — Toda a página é gerada por <code>renderer.js</code> a partir de <code>content.json</code> + <code>design.json</code>
</div>

<header class="ae-site-header">
  <div>
    <div class="ae-site-header__brand">Audit Educa</div>
    <div class="ae-site-header__sub">Conteúdo técnico gratuito · IFRS · NBC TA · CPCs · NBC PP · CLT</div>
  </div>
  <nav class="ae-site-header__nav">
    <a href="#">Biblioteca</a>
    <a href="#">Ferramentas</a>
    <a href="#">Simulados</a>
    <a href="#">Guias</a>
  </nav>
</header>

<!-- O renderer monta tudo aqui -->
<div id="app"></div>

<!-- ─── Scripts ─────────────────────────────────────────────────────────── -->
<script src="renderer.js"></script>
<script>
  // ─── Inicialização ───────────────────────────────────────────────────────
  // Em produção: loadAuditEduca() com URLs reais
  // Em dev/demo: injetar os objetos diretamente (evita CORS em file://)

  Promise.all([
    fetch('content.json').then(r => r.json()),
    fetch('design.json').then(r => r.json()),
  ]).then(([content, design]) => {
    const renderer = new AuditEducaRenderer(content, design);
    renderer.renderAll('#app');

    // Evento de filtro (extensível)
    document.addEventListener('ae:filter', e => {
      console.log('[AE] Filtro selecionado:', e.detail);
      // Aqui você pode filtrar artigos visíveis com data-category
    });

  }).catch(err => {
    document.getElementById('app').innerHTML =
      `<p style="padding:2rem;color:red">Erro ao carregar JSONs: ${err.message}<br>
       Execute a partir de um servidor local (ex: <code>npx serve .</code>)</p>`;
  });
</script>
</body>
</html>
